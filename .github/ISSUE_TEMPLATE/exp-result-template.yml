name: Experiments
title: "[EXP] "
description: Share and discuss experiments related to the project.
labels: ["Type: Experiment", "Priority: Medium", "Status: Pending"]
body:
  - type: checkboxes
    id: no-duplicate-experiment
    attributes:
      label: "⚠️ Please check that similar experiments haven't been shared already."
      description: "This helps us avoid redundancy and keeps experiment records organized."
      options:
        - label: "이전에 공유된 [실험들](https://github.com/juyoung-song/Team2-RAG-Project/issues?q=is%3Aissue+label%3A%22Type%3A+Experiment%22+) 중 중복되는 것이 없습니다."
          required: true

  - type: input
    id: experiment-setup
    attributes:
      label: "⚙️ 실험 환경/설정"
      description: "어떤 모델이나 파라미터를 사용했나요?"
      placeholder: "예: GPT-4o, Retriever: BM25, Top-k: 5"
    validations:
      required: true

  - type: dropdown
    id: experiment-category
    attributes:
      label: "🏷️ 실험 카테고리"
      description: "어느 부분을 개선하기 위한 실험인가요?"
      options:
        - 데이터 전처리 (Cleaning)
        - 임베딩 모델 (Embedding)
        - 검색 알고리즘 (Retriever)
        - 생성 프롬프트 (Prompt Engineering)
        - 파이프라인 최적화 (RAG Flow)
    validations:
      required: true

  - type: textarea
    id: experiment-summary
    attributes:
      label: "📊 실험 요약 및 결과"
      description: "실험의 주요 결과(지표 포함)와 결론을 간략히 요약해주세요."
      placeholder: "예: Retrieval Recall@5가 0.75에서 0.82로 향상됨."
    validations:
      required: true

  - type: textarea
    id: key-observations
    attributes:
      label: "🔍 주요 관찰 내용"
      description: "실험 중에 특히 눈에 띄었던 점이나 흥미로운 발견이 있다면 공유해주세요."
      placeholder: "예: 특정 도메인 용어(RFP 내 전문용어)에서 검색 실패가 잦음."
    validations:
      required: false

  - type: textarea
    id: next-steps
    attributes:
      label: "➡️ 다음 단계 제안"
      description: "이 실험에 기반하여 제안할 수 있는 다음 실험이나 개선 사항이 있으면 작성해주세요."
      placeholder: "예: 오답 노트를 기반으로 Prompt Few-shot 추가 실험 예정."
    validations:
      required: false

  - type: textarea
    id: related-experiments
    attributes:
      label: "🔗 관련 이슈"
      description: "이 실험과 관련된 이전 이슈가 있다면 이슈 번호를 간단히 언급해주세요."
      placeholder: "예: 관련 실험 - #45, #50"
    validations:
      required: false