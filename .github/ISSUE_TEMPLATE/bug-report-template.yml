name: Bug Report
title: "[BUG] "
description: Report a bug or issue in the project.
labels: ["Type: Bug", "Priority: Medium", "Status: Pending"]
body:
  - type: checkboxes
    id: no-duplicate-bug
    attributes:
      label: "⚠️ Please check for similar bug reports"
      description: "이미 보고된 버그 중 중복되는 것이 없는지 확인해 주세요."
      options:
        - label: "이전에 보고된 [버그 리포트](https://github.com/juyoung-song/Team2-RAG-Project/issues?q=is%3Aissue+label%3A%22Type%3A+Bug%22+) 중 중복되는 것이 없습니다."
          required: true

  - type: textarea
    id: bug-description
    attributes:
      label: "📄 버그 설명"
      description: "버그가 발생한 상황과 증상을 자세히 설명해주세요."
      placeholder: "예: 특정 PDF 파일 로드 시 인코딩 에러 발생으로 텍스트 추출이 중단됩니다."
    validations:
      required: true

  - type: textarea
    id: bug-steps
    attributes:
      label: "📝 재현 단계"
      description: "버그를 재현할 수 있는 단계를 순서대로 작성해주세요."
      placeholder: "1. data/raw 폴더에 PDF 추가\n2. src/loader.py 실행\n3. 에러 발생 확인"
    validations:
      required: true

  - type: textarea
    id: error-logs
    attributes:
      label: "💻 에러 로그 / 스크린샷"
      description: "터미널의 에러 로그(Traceback)를 복사해 넣거나 이미지를 드래그해서 넣어주세요."
      placeholder: "```text\nTraceback (most recent call last):\n...\nValueError: ...\n```"
    validations:
      required: false

  - type: textarea
    id: expected-behavior
    attributes:
      label: "✅ 기대되는 동작"
      description: "정상적인 동작을 설명해주세요."
      placeholder: "모든 PDF가 에러 없이 텍스트로 추출되어 CSV에 기록되어야 함."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: "❌ 실제 동작"
      description: "실제로 일어난 동작을 설명해주세요."
      placeholder: "중간에 추출이 멈추고 'UnicodeDecodeError' 발생"
    validations:
      required: true

  - type: textarea
    id: related-issues
    attributes:
      label: "🔗 관련 이슈"
      description: "관련 이슈 번호가 있다면 적어주세요."
      placeholder: "#12"
    validations:
      required: false